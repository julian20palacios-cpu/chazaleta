<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Index</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />

    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <section class="container">
        <header>
            <div class="degradado"></div>
            <div class="bienvenida">
                <h3>Bienvenido a Nuestro Restaurante</h3>
                <h6>Descubre nuestra deliciosa comida</h6>
            </div>
            <div class="buscador">
                    <i class="cuadrado-boton fa fa-location-dot centrar"></i>
                    <input type="text" placeholder="Busca tu restaurante favorito" >
                    <button class="btn-buscar"><i class="fa fa-search"></i></button>
            </div>
        </header>
        <main>
            <nav class="categorias">
                <a class = "item-categoria"href="#">
                    <i class="fa-solid fa-pizza-slice"></i>
                    <span>PIZZA</span>
                </a>
                <a href="#">
                    <i class="fa-solid fa-burger"></i>
                    <span>BURGUER</span>
                </a>
                <a href="#">
                    <i class="fa-solid fa-drumstick-bite"></i>
                    <span>POLLO</span>
                </a>
                <a href="#">
                    <i class="fa-solid fa-bowl-rice"></i>
                    <span>ARROZ</span>
                </a>
            </nav>
            <section class="restaurantes"></section>
        </main>
    </section>

    <!-- comentario -->
</body>
</html>
